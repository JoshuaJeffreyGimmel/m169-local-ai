global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'litellm'
    static_configs:
      - targets: ['litellm:4000']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'gpu'
    static_configs:
      - targets: ['dcgm-exporter:9400']

  - job_name: 'energy'
    static_configs:
      - targets: ['scaphandre:8080']
